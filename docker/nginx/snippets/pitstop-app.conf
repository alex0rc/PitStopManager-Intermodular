# Rutas de la aplicación (incluido desde el server HTTPS)

location ^~ /storage/ {
    alias /var/www/html/storage/app/public/;
}

# CSS/JS/favicon del panel admin (Laravel public/, no el build de Angular)
location ~ ^/(css|js)/ {
    root /var/www/html/public;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
}

location = /favicon.svg {
    root /var/www/html/public;
}

location = /logo.png {
    root /var/www/frontend;
}

# Laravel: todo /api, /admin y /sanctum va a index.php
location ~ ^/(api|admin|sanctum)(/.*)?$ {
    fastcgi_pass php:9000;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
    fastcgi_param SCRIPT_NAME /index.php;
    fastcgi_param REQUEST_URI $request_uri;
    fastcgi_param HTTPS on;
    fastcgi_param HTTP_X_FORWARDED_PROTO https;
    include fastcgi_params;
}

# Assets Angular con hash en el nombre (JS/CSS chunks, imágenes, fuentes)
location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
    root /var/www/frontend;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
}

location / {
    root /var/www/frontend;
    index index.html;
    try_files $uri $uri/ /index.html;
}

location ~ /\.ht {
    deny all;
}
