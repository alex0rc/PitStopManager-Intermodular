version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist/frontend/browser:/var/www/frontend
    depends_on:
      - php
    networks:
      - pitstop

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
    networks:
      - pitstop

  db:
    image: mariadb:10.11
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: pitstop_manager
      MYSQL_USER: pitstop
      MYSQL_PASSWORD: pitstop
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - pitstop

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: secret
    depends_on:
      - db
    networks:
      - pitstop

networks:
  pitstop:
    driver: bridge

volumes:
  dbdata:
