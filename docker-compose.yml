version: '3.8'

services:
  certs:
    image: alpine/openssl
    volumes:
      - ./docker/certs:/certs
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ ! -f /certs/fullchain.pem ]; then
          openssl req -x509 -nodes -days 825 -newkey rsa:2048 \
            -keyout /certs/privkey.pem -out /certs/fullchain.pem \
            -subj "/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,DNS:pitstop.local,IP:127.0.0.1"
          echo "Certificados SSL creados en docker/certs/"
        fi
    restart: "no"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/snippets/pitstop-app.conf:/etc/nginx/snippets/pitstop-app.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
      - ./frontend/dist/frontend/browser:/var/www/frontend
    depends_on:
      certs:
        condition: service_completed_successfully
      php:
        condition: service_started
    networks:
      - pitstop

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
    networks:
      - pitstop

  db:
    image: mariadb:10.11
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: pitstop_manager
      MYSQL_USER: pitstop
      MYSQL_PASSWORD: pitstop
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - pitstop

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: secret
    depends_on:
      - db
    networks:
      - pitstop

  bind9:
    profiles: ["dns"]
    image: internetsystemsconsortium/bind9:9.18
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - ./docker/bind9/named.conf:/etc/bind/named.conf:ro
      - ./docker/bind9/zones:/etc/bind/zones:ro
    networks:
      - pitstop

networks:
  pitstop:
    driver: bridge

volumes:
  dbdata:
